# ============================================================
# Marzban Panel — primary VPN node
#
# Start: docker compose up -d
#
# Initial setup:
#   1. Generate SSL certs (required — see README)
#   2. Create admin: docker compose exec marzban marzban-cli admin create --sudo
#      (or non-interactively via MARZBAN_ADMIN_PASSWORD env var)
#   3. Access panel via SSH tunnel: ssh -L 8000:localhost:8000 user@server
#      Then open https://localhost:8000/dashboard/
# ============================================================

services:
  marzban:
    image: gozargah/marzban:latest
    container_name: marzban
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/marzban:/var/lib/marzban
    ports:
      - "127.0.0.1:8000:8000"              # Panel UI — localhost only (SSH tunnel)
      - "${SERVER_IP}:443:443/tcp"          # VLESS+REALITY — public IP only
      - "${SERVER_IP}:62050:62050"          # Node API
      - "${SERVER_IP}:62051:62051"          # Node API (alternate)
    mem_limit: 512m
